name = "trading"
description = "Mode trading IA avec MT5 + dashboard"

[env]
ORION_PROVIDER = "anthropic"
ORION_TRADER_MODEL = "claude-haiku-4-5-20251001"
ORION_TRADER_MIN_INTERVAL = "300"
SERVER_HOST = "0.0.0.0"
SERVER_PORT = "8765"

[notes]
required_secrets = ["ANTHROPIC_API_KEY", "ORION_SECRET_TOKEN"]
post_setup = [
    "Installe l'Expert Advisor : EA/OrionTrader.mq5 dans MetaEditor",
    "Active le trading automatique dans MT5",
    "Lance : python start.py server",
    "Ouvre http://localhost:8765/trading",
]
